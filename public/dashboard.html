<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد Kia Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- هدر -->
        <header>
            <div class="logo">
                <h1>🔥 Kia Panel</h1>
                <span class="version">v2.0</span>
            </div>
            <div class="user-info">
                <span id="statsBadge">۰ کانفیگ</span>
                <button id="logoutBtn" class="btn-secondary">خروج</button>
            </div>
        </header>

        <!-- آمار کلی -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-info">
                    <span class="stat-value" id="totalUsers">۰</span>
                    <span class="stat-label">کل کانفیگ‌ها</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-info">
                    <span class="stat-value" id="activeUsers">۰</span>
                    <span class="stat-label">فعال</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-info">
                    <span class="stat-value" id="totalVolume">۰</span>
                    <span class="stat-label">حجم مصرفی کل</span>
                </div>
            </div>
        </div>

        <!-- بخش‌های اصلی -->
        <div class="panel-sections">
            <!-- بخش ساخت کانفیگ -->
            <div class="section">
                <h2>✨ ساخت کانفیگ جدید</h2>
                <form id="createForm">
                    <div class="form-group">
                        <label>نام کاربری</label>
                        <input type="text" id="username" placeholder="مثلاً: ali_m" required>
                    </div>
                    <div class="form-group">
                        <label>حجم (گیگابایت)</label>
                        <input type="number" id="volume" placeholder="مثلاً: 10" min="1" required>
                    </div>
                    <div class="form-group">
                        <label>مدت زمان (روز)</label>
                        <input type="number" id="days" placeholder="مثلاً: 30" min="1" required>
                    </div>
                    <button type="submit" class="btn-primary">🚀 ساخت کانفیگ</button>
                </form>
                <div id="createResult" class="result-box" style="display:none;"></div>
            </div>

            <!-- بخش لیست کانفیگ‌ها -->
            <div class="section">
                <h2>📋 لیست کانفیگ‌ها</h2>
                <div id="usersList">
                    <p class="empty-msg">هیچ کانفیگی ساخته نشده است.</p>
                </div>
            </div>
        </div>

        <!-- فوتر -->
        <footer>
            <p>طراحی و توسعه: @kiarash1792</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
